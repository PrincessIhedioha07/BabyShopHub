spring:
  application:
    name: BabyShopHub API
  jackson:
    serialization:
      fail-on-empty-beans: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:2592000000}   # 30 days
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:7776000000}  # 90 days

  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}

  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT:classpath:firebase-service-account.json}
    enabled: ${FIREBASE_ENABLED:false}

  rate-limit:
    auth-requests-per-minute: 10

  admin:
    access-code: ${ADMIN_ACCESS_CODE}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.babyshophub: DEBUG
    org.springframework.security: INFO
